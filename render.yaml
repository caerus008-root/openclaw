services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: GEMINI_API_KEY
        sync: false
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
